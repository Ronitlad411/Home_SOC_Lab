  <line x1="530" y1="220" x2="615" y2="410" stroke="#9b59b6" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="530" y1="230" x2="615" y2="490" stroke="#27ae60" stroke-width="1" stroke-dasharray="5,3"/>

