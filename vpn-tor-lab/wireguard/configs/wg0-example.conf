# WireGuard Server Config — Example (keys redacted)
# Place at /etc/wireguard/wg0.conf

[Interface]
Address = 10.8.0.1/24
ListenPort = 51820
PrivateKey = <SERVER_PRIVATE_KEY>
PostUp = ufw route allow in on wg0 out on wlp3s0
PostDown = ufw route delete allow in on wg0 out on wlp3s0

# Windows Client
[Peer]
PublicKey = <CLIENT_PUBLIC_KEY>
AllowedIPs = 10.8.0.2/32

# Android Client
[Peer]
PublicKey = <ANDROID_PUBLIC_KEY>
AllowedIPs = 10.8.0.3/32
